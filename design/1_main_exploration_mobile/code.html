<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ArtRun - Map Exploration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error-container": "#ffdad6",
                        "on-tertiary-container": "#6d627c",
                        "surface-variant": "#dce2f6",
                        "secondary-container": "#d0e3e8",
                        "on-primary-container": "#3d6e79",
                        "error": "#ba1a1a",
                        "inverse-surface": "#2a3040",
                        "on-secondary-container": "#54666a",
                        "surface": "#f9f9ff",
                        "tertiary-fixed-dim": "#cec1de",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "on-secondary-fixed-variant": "#384a4e",
                        "tertiary-fixed": "#ebddfb",
                        "on-primary-fixed": "#001f25",
                        "background": "#f9f9ff",
                        "primary-fixed-dim": "#9dcedb",
                        "tertiary-container": "#efe1ff",
                        "surface-tint": "#346570",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#0c1e22",
                        "surface-container": "#e9edff",
                        "on-error-container": "#93000a",
                        "surface-bright": "#f9f9ff",
                        "surface-container-highest": "#dce2f6",
                        "secondary-fixed": "#d3e6eb",
                        "primary": "#346570",
                        "tertiary": "#645a73",
                        "secondary": "#506166",
                        "surface-container-low": "#f1f3ff",
                        "on-tertiary-fixed-variant": "#4c435a",
                        "surface-dim": "#d3daee",
                        "on-surface-variant": "#40484a",
                        "outline-variant": "#c0c8ca",
                        "outline": "#70787b",
                        "secondary-fixed-dim": "#b7cacf",
                        "inverse-primary": "#9dcedb",
                        "primary-container": "#bdeffc",
                        "on-background": "#151b2a",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#184d58",
                        "inverse-on-surface": "#edf0ff",
                        "primary-fixed": "#b9ebf8",
                        "on-tertiary-fixed": "#20182d",
                        "on-surface": "#151b2a",
                        "surface-container-high": "#e2e8fc",
                        "on-secondary": "#ffffff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    },
                    boxShadow: {
                        'ambient': '0 12px 32px rgba(11, 18, 32, 0.06)'
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface antialiased overflow-hidden w-full h-screen relative selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md fixed top-0 left-0 w-full flex justify-between items-center px-6 py-3 docked full-width z-40">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-cyan-800 dark:text-cyan-300">edit_road</span>
<span class="Plus Jakarta Sans Display text-lg font-bold tracking-tight text-xl font-black text-slate-900 dark:text-white">ArtRun</span>
</div>
<button class="hover:bg-slate-100/50 dark:hover:bg-slate-800/50 transition-colors scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400">menu</span>
</button>
</header>
<!-- Map Canvas Area -->
<main class="w-full h-full relative z-0">
<!-- Simulated Map Background -->
<img class="absolute inset-0 w-full h-full object-cover opacity-80" data-alt="light stylized map of Seoul area showing streets and terrain in pale subtle tones with a sketchbook aesthetic" data-location="Seoul" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDxFDSW-ipZy6FMgX8edur_bG8FeOr-j2IEqrsRLWGylYIyVLWZ2cVVFtlozzIwZU28DfzdlLdpPeiw3vtMdxvYzSevSPQCP8jHQKF4HEZapxqQU7uzQmkBXtuMFaDeEDqG9fdnnUjKudvs2onRGl1In-ZLB4bmwRwJ273UPIfbq1yYtTSm4YOhnk0PEy8kCKoiyGiPFkStSQMovrWfonrrHrcOLZyTVpMO7ugOFMQ9ZkcG7Hj_o9gUO-ziPIE5JpMYdSnxTs7sCjI"/>
<!-- Map Overlay Gradient to soften the image -->
<div class="absolute inset-0 bg-surface/40 mix-blend-overlay"></div>
<!-- Simulated Sketch Paths on Map -->
<svg class="absolute inset-0 w-full h-full pointer-events-none z-10" preserveaspectratio="xMidYMid slice" viewbox="0 0 1080 1920">
<!-- Path 1 (Dog shape sketch) -->
<path class="drop-shadow-[0_0_2px_rgba(255,255,255,0.8)]" d="M 300 800 Q 350 750, 400 800 T 500 850 T 600 800 T 700 900 T 650 1000 T 550 1100 T 450 1050 Z" fill="none" opacity="0.35" stroke="#BDEFFC" stroke-linecap="round" stroke-linejoin="round" stroke-width="12"></path>
<!-- Path 2 (Abstract running shape) -->
<path class="drop-shadow-[0_0_2px_rgba(255,255,255,0.8)]" d="M 200 400 L 250 500 L 350 480 L 400 600" fill="none" opacity="0.35" stroke="#BDEFFC" stroke-linecap="round" stroke-linejoin="round" stroke-width="10"></path>
</svg>
<!-- Ghost Hint Text -->
<div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none z-10">
<span class="text-on-surface-variant/60 font-body text-sm font-medium tracking-wide bg-surface-container-lowest/50 backdrop-blur-sm px-4 py-2 rounded-full border border-outline-variant/15">Tap the map to start sketching</span>
</div>
</main>
<!-- Floating Right Toolbar -->
<aside class="absolute right-4 top-24 z-20 flex flex-col items-center bg-surface-container-lowest/90 backdrop-blur-md rounded-xl shadow-ambient p-2 gap-3 border border-outline-variant/15 w-14">
<button aria-label="Undo" class="p-2 rounded-lg text-outline/50 cursor-not-allowed flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'wght' 300;">undo</span>
</button>
<button aria-label="Redo" class="p-2 rounded-lg text-outline/50 cursor-not-allowed flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'wght' 300;">redo</span>
</button>
<button aria-label="Clear" class="p-2 rounded-lg text-outline/50 cursor-not-allowed flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'wght' 300;">delete</span>
</button>
<div class="w-8 h-[1px] bg-outline-variant/30 my-1"></div>
<button aria-label="Fit to Screen" class="p-2 rounded-lg text-on-surface hover:bg-surface-container-low transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'wght' 400;">fit_screen</span>
</button>
<div class="w-8 h-[1px] bg-outline-variant/30 my-1"></div>
<div class="flex flex-col items-center justify-center text-center py-1">
<span class="font-headline font-bold text-xs text-on-surface">0.0</span>
<span class="font-body text-[8px] text-on-surface-variant font-semibold uppercase tracking-wider">km</span>
</div>
<button class="mt-1 w-10 h-10 rounded-lg bg-primary-container text-on-surface flex flex-col items-center justify-center border-b-[1.5px] border-primary/20 shadow-sm hover:brightness-95 transition-all">
<span class="font-headline font-bold text-[9px] leading-none mb-0.5">GPX</span>
<span class="material-symbols-outlined text-[14px] leading-none" style="font-variation-settings: 'wght' 600;">arrow_downward</span>
</button>
</aside>
<!-- Bottom Center Segmented Control -->
<div class="absolute bottom-[100px] left-1/2 -translate-x-1/2 z-20">
<div class="bg-surface-container-lowest/90 backdrop-blur-md rounded-full shadow-ambient p-1 flex items-center border border-outline-variant/15">
<!-- Active State -->
<button class="px-5 py-2.5 rounded-full bg-primary-container text-on-surface font-headline text-sm font-semibold shadow-sm transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">draw</span>
                Point
            </button>
<!-- Inactive State -->
<button class="px-5 py-2.5 rounded-full text-on-surface-variant hover:bg-surface-container-low font-body text-sm font-medium transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">pan_tool</span>
                Drag
            </button>
<!-- Inactive State -->
<button class="px-5 py-2.5 rounded-full text-on-surface-variant hover:bg-surface-container-low font-body text-sm font-medium transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">ads_click</span>
                Select
            </button>
</div>
</div>
<!-- BottomNavBar (Canvas active) -->
<nav class="bg-white dark:bg-slate-950 docked full-width bottom-0 rounded-t-2xl shadow-[0_-12px_32px_rgba(11,18,32,0.06)] fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe pt-2 pb-4">
<button class="hover:bg-slate-50 dark:hover:bg-slate-800 scale-95 duration-200 ease-out flex flex-col items-center justify-center bg-cyan-100 dark:bg-cyan-900/30 text-cyan-900 dark:text-cyan-100 rounded-xl px-3 py-1.5 w-16">
<span class="material-symbols-outlined mb-1" data-weight="fill" style="font-variation-settings: 'FILL' 1;">draw</span>
<span class="Plus Jakarta Sans Body text-[10px] font-semibold tracking-wider">Canvas</span>
</button>
<button class="hover:bg-slate-50 dark:hover:bg-slate-800 scale-95 duration-200 ease-out flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 w-16">
<span class="material-symbols-outlined mb-1">explore</span>
<span class="Plus Jakarta Sans Body text-[10px] font-semibold tracking-wider">Gallery</span>
</button>
<button class="hover:bg-slate-50 dark:hover:bg-slate-800 scale-95 duration-200 ease-out flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 w-16">
<span class="material-symbols-outlined mb-1">history</span>
<span class="Plus Jakarta Sans Body text-[10px] font-semibold tracking-wider">Activity</span>
</button>
<button class="hover:bg-slate-50 dark:hover:bg-slate-800 scale-95 duration-200 ease-out flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 w-16">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="Plus Jakarta Sans Body text-[10px] font-semibold tracking-wider">Settings</span>
</button>
</nav>
</body></html>
